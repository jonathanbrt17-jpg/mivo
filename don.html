<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supportez Horizon Cané</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  /* Reset */
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(120deg, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: moveBG 15s ease infinite;
    color: white;
  }

  @keyframes moveBG {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  .container {
    background: rgba(0,0,0,0.5);
    padding: 40px 50px;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 20px;
  }

  p {
    font-size: 1.2rem;
    margin-bottom: 30px;
  }

  .paypal-button {
    display: inline-block;
    background-color: #ffc439;
    color: #111;
    font-weight: 700;
    padding: 15px 30px;
    border-radius: 10px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    font-size: 1.1rem;
  }

  .paypal-button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<div class="container">
  <h1>Soutenez Horizon Cané</h1>
  <p>Montant fixe : 0 € sur 800 €</p>
  <!-- Lien PayPal vers ton compte ou bouton -->
  <a class="paypal-button" href="https://www.paypal.com/donate?hosted_button_id=TON_ID_PAYPAL" target="_blank">
    Payer avec PayPal
  </a>
</div>

</body>
</html>
