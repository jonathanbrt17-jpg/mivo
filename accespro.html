<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIVO — Accès Pro</title>

<style>
body{
  background:#000814;
  color:white;
  font-family:'Poppins', sans-serif;
  margin:0;
  padding:20px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back-btn{
  background:#00c6ff;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.clock{
  font-weight:bold;
  color:#00c6ff;
}

.container{
  max-width:800px;
  margin:40px auto;
  text-align:center;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:15px;
  font-size:16px;
}

textarea{
  height:250px;
  resize:none;
}

button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="top-bar">
  <button class="back-btn" onclick="window.location.href='index.html'">⬅ Retour</button>
  <div class="clock" id="clock"></div>
</div>

<div class="container" id="loginBox">
  <h2>🔐 Accès Pro</h2>
  <p>Entrez le code :</p>
  <input type="password" id="codeInput">
  <button onclick="checkCode()">Entrer</button>
</div>

<div class="container hidden" id="editorBox">
  <h2>📝 Espace Pro</h2>

  <input type="email" id="recipientEmail" placeholder="Mail du destinataire">

  <textarea id="textArea" placeholder="Écrivez votre message ici..."></textarea>

  <button onclick="sendEmail()">📧 Envoyer le mail</button>
</div>

<script>
const SECRET_CODE = "MIVO2025";

function checkCode(){
  const input = document.getElementById("codeInput").value;
  if(input === SECRET_CODE){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("editorBox").classList.remove("hidden");
    loadText();
  } else {
    alert("Code incorrect");
  }
}

/* Sauvegarde automatique */
const textarea = document.getElementById("textArea");

function saveText(){
  localStorage.setItem("mivo_pro_text", textarea.value);
}

function loadText(){
  const saved = localStorage.getItem("mivo_pro_text");
  if(saved){
    textarea.value = saved;
  }
}

textarea.addEventListener("input", saveText);

/* Envoi mail */
function sendEmail(){
  const recipient = document.getElementById("recipientEmail").value;
  const message = textarea.value;

  if(!recipient || !message){
    alert("Remplis tous les champs !");
    return;
  }

  const subject = "Message depuis MIVO Accès Pro";
  const mailtoLink = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
  window.location.href = mailtoLink;
}

/* Heure Paris */
function updateClock(){
  const options = {
    timeZone: "Europe/Paris",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  };
  const now = new Date().toLocaleTimeString("fr-FR", options);
  document.getElementById("clock").textContent = "Paris : " + now;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
